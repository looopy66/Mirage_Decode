name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install web dependencies and build
        working-directory: ./web
        run: |
          yarn install
          yarn build

      - name: Initialize Capacitor for Android
        working-directory: ./web
        run: |
          yarn add @capacitor/core
          yarn add -D @capacitor/cli @capacitor/android
          npx cap init "MirageDecode" "com.tankfactory.mirage" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Inject Storage Permissions into AndroidManifest.xml
        working-directory: ./web/android/app/src/main
        run: |
          # 使用 Node 脚本自动修改 AndroidManifest.xml，注入读写权限和兼容属性
          node -e "
          const fs = require('fs');
          const file = 'AndroidManifest.xml';
          let content = fs.readFileSync(file, 'utf8');
          
          // 准备要插入的权限声明
          const permissions = '\n    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />\n';
          
          // 在 <application> 标签前插入权限
          content = content.replace('<application', permissions + '    <application');
          
          // 为了兼容 Android 10+ 的分区存储机制，在 application 标签中加入 requestLegacyExternalStorage
          content = content.replace('<application', '<application android:requestLegacyExternalStorage=\"true\" ');
          
          fs.writeFileSync(file, content);
          console.log('Successfully injected storage permissions.');
          "

      - name: Build APK with Gradle
        working-directory: ./web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mirage_Decode_APK
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
