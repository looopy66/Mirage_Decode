name: Build Android APK (Compatible Mode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install web dependencies
        working-directory: ./web
        run: yarn install

      - name: Patch Frontend Code for Blob Download
        working-directory: ./web/src
        run: |
          # 这是一个注入脚本，用于寻找保存图片的函数并替换为 Blob 下载逻辑
          # 我们在 App.tsx 中注入一个全局兼容的下载函数
          node -e "
          const fs = require('fs');
          const path = 'App.tsx';
          if (!fs.existsSync(path)) process.exit(0);
          let content = fs.readFileSync(path, 'utf8');

          // 1. 定义兼容安卓的 Blob 下载工具函数
          const downloadFn = \`
          const safeDownloadBase64 = (base64Data, filename) => {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = filename;
            // 兼容安卓 WebView 的关键：必须添加到 DOM
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };
          \`;

          // 2. 注入函数定义
          content = downloadFn + content;

          // 3. 寻找仓库中处理 'canvas.toDataURL' 或类似的保存逻辑并替换
          // 注意：此处根据 Mirage_Decode 的源码逻辑进行正则替换
          content = content.replace(/saveAs\((.*?)\)/g, 'safeDownloadBase64($1, \"icon.png\")');
          
          fs.writeFileSync(path, content);
          console.log('Frontend code patched for mobile compatibility.');
          "

      - name: Build Web Project
        working-directory: ./web
        run: yarn build

      - name: Initialize Capacitor and Android
        working-directory: ./web
        run: |
          yarn add @capacitor/core
          yarn add -D @capacitor/cli @capacitor/android
          npx cap init "MirageDecode" "com.tankfactory.mirage" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Inject Android Permissions
        working-directory: ./web/android/app/src/main
        run: |
          node -e "
          const fs = require('fs');
          const file = 'AndroidManifest.xml';
          let content = fs.readFileSync(file, 'utf8');
          const perms = '\n    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />\n';
          content = content.replace('<application', perms + '    <application android:requestLegacyExternalStorage=\"true\" ');
          fs.writeFileSync(file, content);
          "

      - name: Build APK with Gradle
        working-directory: ./web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mirage_Decode_Compatible_APK
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
